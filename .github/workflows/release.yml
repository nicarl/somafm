name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new_release_version: ${{ steps.semantic.outputs.version }}
      new_release_published: ${{ steps.semantic.outputs.version != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run go-semantic-release
        id: semantic
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: sudo apt-get install -y libasound2-dev
        if: matrix.os == 'ubuntu-latest'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: >
          go build -o
          somafm-v${{ needs.semantic-release.outputs.new_release_version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          ./cmd/somafm.go

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.semantic-release.outputs.new_release_version }}
          files: somafm-v${{ needs.semantic-release.outputs.new_release_version }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

  homebrew-releaser:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Release to Homebrew tap
        uses: Justintime50/homebrew-releaser@v1
        with:
          homebrew_owner: nicarl
          homebrew_tap: homebrew-somafm
          formula_folder: Formula
          github_token: ${{ secrets.HOMEBREW_PUBLISH_TOKEN }}
          commit_owner: nicarl
          commit_email: nicocarl@protonmail.com
          depends_on: |
            "go" => :build
            "pkg-config" => :build
          install: |
            if OS.linux?
              ENV.prepend_path "PKG_CONFIG_PATH", "/usr/lib/x86_64-linux-gnu/pkgconfig"
            end
            system "go", "build", "-o", bin/"somafm", "./cmd/somafm.go"
          update_readme_table: true
          skip_commit: false
          debug: false
